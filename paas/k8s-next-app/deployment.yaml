# Deployment for Next.js app (PFE DevSecOps)
# Apply after building and pushing image to Docker Hub
apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-app
  labels:
    app: next-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: next-app
  template:
    metadata:
      labels:
        app: next-app
    spec:
      containers:
        - name: next-app
          image: <DOCKERHUB_USERNAME>/next-app:latest   # Replace with your Docker Hub image
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          env: []   # Add env vars if needed, e.g. DATABASE_URL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
