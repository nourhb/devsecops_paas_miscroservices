# Jenkins in cicd — persistent /var/jenkins_home (survives pod restart).
# Use instead of jenkins-cicd-emptydir.yaml once local-path has free space on master.
#
# Apply:
#   kubectl apply -f paas/k8s-manifests/lab/jenkins-plugins-configmap.yaml
#   kubectl apply -f paas/k8s-manifests/lab/jenkins-cicd-pvc.yaml
# If createItem returns HTTP 500: bash paas/scripts/install-jenkins-plugins-lab.sh
#
# Do NOT delete jenkins-pvc unless you intend to wipe jobs/plugins.
# recover-k3s-memory-lab.sh deletes this PVC — avoid that if you need to keep data.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-pvc
  namespace: cicd
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: cicd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      nodeSelector:
        kubernetes.io/hostname: master
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts
          ports:
            - containerPort: 8080
          env:
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx768m -Djenkins.install.runSetupWizard=false"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: jenkins-storage
              mountPath: /var/jenkins_home
            - name: jenkins-plugins
              mountPath: /usr/share/jenkins/ref/plugins.txt
              subPath: plugins.txt
            - name: jenkins-plugins
              mountPath: /var/jenkins_ref_plugins/plugins.txt
              subPath: plugins.txt
      volumes:
        - name: jenkins-storage
          persistentVolumeClaim:
            claimName: jenkins-pvc
        - name: jenkins-plugins
          configMap:
            name: jenkins-plugins
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-service
  namespace: cicd
spec:
  type: NodePort
  selector:
    app: jenkins
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30090
