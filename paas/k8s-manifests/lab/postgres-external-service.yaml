# PaaS frontend expects postgres.paas.svc.cluster.local:5432 (see docker-compose.env).
# Lab Postgres often runs in namespace `databases` as postgres-service — this alias fixes login.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: paas
spec:
  type: ExternalName
  externalName: postgres-service.databases.svc.cluster.local
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
