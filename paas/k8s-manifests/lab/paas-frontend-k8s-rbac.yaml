# Lets deployment/frontend in namespace paas read cluster workloads (Cluster page, pod logs).
# Apply on lab master: kubectl apply -f paas/k8s-manifests/lab/paas-frontend-k8s-rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paas-frontend
  namespace: paas
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paas-frontend-cluster-reader
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "pods/log", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paas-frontend-cluster-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paas-frontend-cluster-reader
subjects:
  - kind: ServiceAccount
    name: paas-frontend
    namespace: paas
