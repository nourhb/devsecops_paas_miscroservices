# PaaS UI DATABASE_URL: postgres.paas.svc.cluster.local:5432 (user root, db paas)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: paas
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: paas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: master
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["postgres", "-c", "lc_messages=C"]
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: root
            - name: POSTGRES_DB
              value: paas
          ports:
            - containerPort: 5432
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
