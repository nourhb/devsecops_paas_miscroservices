# Plugins required for Pipeline jobs (paas-deploy). Mounted into Jenkins ref dir.
apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-plugins
  namespace: cicd
data:
  plugins.txt: |
    workflow-aggregator
    git
    credentials-binding
    plain-credentials
    ssh-credentials
    pipeline-model-definition
    pipeline-stage-view
    job-dsl
