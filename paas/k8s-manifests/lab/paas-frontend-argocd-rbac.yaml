apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: paas-frontend-argocd-refresh
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: paas-frontend-argocd-refresh
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: paas-frontend-argocd-refresh
subjects:
  - kind: ServiceAccount
    name: paas-frontend
    namespace: paas
