# Merge these fragments into jcasc-default-config.yaml inside ConfigMap jenkins-jenkins-jcasc-config (namespace jenkins).
# Target path: jenkins.clouds → kubernetes → templates → [template "default"] → containers

jnlp_container_env_append:
  # Add these entries alongside existing JENKINS_URL envVar on the jnlp container:
  - envVar:
      key: "DOCKER_HOST"
      value: "tcp://127.0.0.1:2375"

docker_dind_container:
  - name: "docker"
    image: "docker:27-dind"
    alwaysPullImage: false
    privileged: "true"
    ttyEnabled: false
    resourceRequestCpu: "100m"
    resourceRequestMemory: "512Mi"
    resourceLimitCpu: "1000m"
    resourceLimitMemory: "1536Mi"
    envVars:
      - envVar:
          key: "DOCKER_TLS_CERTDIR"
          value: ""
