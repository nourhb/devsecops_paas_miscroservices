# OPA Gatekeeper – Enforce signed images (Cosign)
# Requires ConstraintTemplate "imagemustbesigned" (or similar) to be installed first.
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: imagemustbesigned
spec:
  crd:
    spec:
      names:
        kind: ImageMustBeSigned
      validation:
        openAPIV3Schema:
          type: object
          properties:
            patterns:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package imagemustbesigned
        violation[{"msg": msg}] {
          container := input_containers[_]
          not signed(container.image)
          msg := sprintf("Image %v must be signed with Cosign", [container.image])
        }
        signed(image) {
          # In practice: verify annotation or external check
          # Example: require annotation cosign.sig
          input.review.object.metadata.annotations["cosign.sig"]
        }
        input_containers[c] {
          c := input.review.object.spec.containers[_]
        }
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: ImageMustBeSigned
metadata:
  name: require-signed-images
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet"]
