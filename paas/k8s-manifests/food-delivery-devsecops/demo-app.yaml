# Placeholder workload so Food-Delivery project URLs (nip.io) resolve while full GitOps/Jenkins pipeline is built.
# Ingress HTTP NodePort on this cluster: 31077 (see: kubectl get svc -n ingress-nginx).
apiVersion: v1
kind: Namespace
metadata:
  name: food-delivery-devsecops
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-delivery-app
  namespace: food-delivery-devsecops
  labels:
    app.kubernetes.io/name: food-delivery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food-delivery
  template:
    metadata:
      labels:
        app: food-delivery
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: gcr.io/google-samples/hello-app:1.0
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: food-delivery-svc
  namespace: food-delivery-devsecops
spec:
  selector:
    app: food-delivery
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: food-delivery-ing
  namespace: food-delivery-devsecops
spec:
  ingressClassName: nginx
  rules:
    - host: food-delivery-devsecops.192.168.56.129.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: food-delivery-svc
                port:
                  number: 80
