apiVersion: v1
kind: ServiceAccount
metadata:
  name: paas-build-bot
  namespace: tekton-pipelines
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: paas-node-build
  namespace: tekton-pipelines
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
    - name: image
      type: string
    - name: build-profile
      type: string
    - name: build-mode
      type: string
    - name: template-version
      type: string
  workspaces:
    - name: source
  results:
    - name: image-url
      description: Fully qualified image name produced by the pipeline.
    - name: image-digest
      description: OCI digest for the pushed image.
  steps:
    - name: clone
      image: alpine/git:2.47.2
      script: |
        set -eu
        git clone "$(params.git-url)" /workspace/source/repo
        cd /workspace/source/repo
        git checkout "$(params.git-revision)"
    - name: npm-install-test-build
      image: mirror.gcr.io/library/node:20-bookworm-slim
      workingDir: /workspace/source/repo
      script: |
        set -eu
        npm config set audit false
        npm config set fund false
        npm ci --no-audit --no-fund
        npm test --if-present
        npm run build --if-present
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:latest
      workingDir: /workspace/source/repo
      resources:
        requests:
          memory: "2Gi"
          cpu: "1000m"
        limits:
          memory: "8Gi"
          cpu: "4000m"
      args:
        - --single-snapshot
        - --context=/workspace/source/repo
        - --dockerfile=/workspace/source/repo/Dockerfile
        - --destination=$(params.image)
        - --digest-file=/tekton/results/image-digest
        - --registry-mirror=mirror.gcr.io
---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: paas-node-build
  namespace: tekton-pipelines
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
    - name: image
      type: string
    - name: project-id
      type: string
    - name: project-name
      type: string
    - name: build-profile
      type: string
    - name: build-mode
      type: string
    - name: template-version
      type: string
    - name: deployment-id
      type: string
      default: ""
  workspaces:
    - name: shared-workspace
  tasks:
    - name: build-node-service
      taskRef:
        name: paas-node-build
      params:
        - name: git-url
          value: $(params.git-url)
        - name: git-revision
          value: $(params.git-revision)
        - name: image
          value: $(params.image)
        - name: build-profile
          value: $(params.build-profile)
        - name: build-mode
          value: $(params.build-mode)
        - name: template-version
          value: $(params.template-version)
      workspaces:
        - name: source
          workspace: shared-workspace
