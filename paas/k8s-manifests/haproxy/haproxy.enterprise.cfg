global
    log stdout format raw local0
    maxconn 4096
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11

defaults
    log global
    mode http
    option httplog
    timeout connect 10s
    timeout client 60s
    timeout server 60s
    retries 3

frontend http_front
    bind *:80
    http-request redirect scheme https code 301 unless { ssl_fc }

frontend https_front
    bind *:443 ssl crt /etc/haproxy/certs/paas.example.com.pem
    option forwardfor
    http-request set-header X-Forwarded-Proto https
    stick-table type ip size 100k expire 10m store http_req_rate(60s)
    http-request track-sc0 src
    http-request deny deny_status 429 if { sc_http_req_rate(0) gt 120 }
    default_backend ingress_nginx_https

backend ingress_nginx_https
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200
    server k8s-master 192.168.56.129:30443 check ssl verify none
    server k8s-worker1 192.168.56.130:30443 check ssl verify none
