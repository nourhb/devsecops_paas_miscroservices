services:
  postgres:
    image: postgres:16-alpine
    container_name: paas-postgres
    command: ["postgres", "-c", "lc_messages=C"]
    environment:
      POSTGRES_DB: paas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Use the default Compose network so DATABASE_URL host "postgres" resolves (host network breaks that name).
  db-push:
    build:
      context: .
      dockerfile: docker/prisma-db-push.Dockerfile
    container_name: paas-db-push
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/paas?options=-c%20lc_messages%3DC
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: paas-frontend
    depends_on:
      postgres:
        condition: service_healthy
      db-push:
        condition: service_completed_successfully
    env_file:
      - path: frontend/docker-compose.env
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/paas?options=-c%20lc_messages%3DC
      NEXT_PUBLIC_API_BASE_URL: ""
      PAAS_STRICT_INTEGRATIONS: "false"
      JENKINS_BUILD_JOB_NAME: paas-deploy
      JENKINS_DEPLOY_JOB_NAME: paas-deploy
      PAAS_MONOREPO_ROOT: /monorepo
      JENKINS_SYNC_INLINE_JOB_BEFORE_TRIGGER: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ..:/monorepo:ro
      # Kubernetes from inside the container: mount your host kubeconfig + set in frontend/docker-compose.env:
      #   KUBERNETES_ENABLED=true
      #   KUBE_CONFIG_PATH=/home/nextjs/.kube/config
      # Define KUBECONFIG_HOST_PATH in paas/.env (used for Compose substitution). Examples:
      #   Windows:  KUBECONFIG_HOST_PATH=C:/Users/YourName/.kube/config
      #   Spaces:   KUBECONFIG_HOST_PATH="C:/Users/Your Name/.kube/config"
      # Linux/macOS: omit KUBECONFIG_HOST_PATH to default to ${HOME}/.kube/config
      - ${KUBECONFIG_HOST_PATH:-${HOME}/.kube/config}:/home/nextjs/.kube/config:ro
    ports:
      - "3000:3000"

volumes:
  postgres_data:
