version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: paas-postgres
    environment:
      POSTGRES_DB: paas
      POSTGRES_USER: paas
      POSTGRES_PASSWORD: paas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paas -d paas"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: paas-frontend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - frontend/.env
    environment:
      DATABASE_URL: postgresql://paas:paas@postgres:5432/paas
      NEXT_PUBLIC_API_BASE_URL: ""
    ports:
      - "3000:3000"

volumes:
  postgres_data:
