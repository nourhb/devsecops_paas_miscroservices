services:
  postgres:
    image: postgres:16-alpine
    container_name: paas-postgres
    command: ["postgres", "-c", "lc_messages=C"]
    environment:
      POSTGRES_DB: paas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paas"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-push:
    build:
      context: .
      dockerfile: docker/prisma-db-push.Dockerfile
      network: host
    container_name: paas-db-push
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/paas?options=-c%20lc_messages%3DC
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      network: host
    container_name: paas-frontend
    depends_on:
      postgres:
        condition: service_healthy
      db-push:
        condition: service_completed_successfully
    env_file:
      - path: frontend/docker-compose.env
        required: true
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/paas?options=-c%20lc_messages%3DC
      NEXT_PUBLIC_API_BASE_URL: ""
      PAAS_STRICT_INTEGRATIONS: "false"
      JENKINS_BUILD_JOB_NAME: paas-deploy
      JENKINS_DEPLOY_JOB_NAME: paas-deploy
      PAAS_MONOREPO_ROOT: /monorepo
      JENKINS_SYNC_INLINE_JOB_BEFORE_TRIGGER: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ..:/monorepo:ro
    ports:
      - "3000:3000"

volumes:
  postgres_data:
