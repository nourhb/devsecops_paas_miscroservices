# Default values for paas-app (generic app deployed by PaaS)
image:
  repository: harbor.example.com/paas/my-app
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: harbor-regcred

replicas: 1

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

env: []

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: my-app.example.com
      paths: []
  tls: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
