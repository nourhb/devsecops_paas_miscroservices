apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paas-app.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "paas-app.name" . }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "paas-app.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "paas-app.name" . }}
    spec:
      imagePullSecrets: {{ .Values.imagePullSecrets | toJson }}
      containers:
        - name: {{ include "paas-app.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env: {{ .Values.env | toJson }}
          resources: {{ .Values.resources | toJson }}
{{- with .Values.livenessProbe }}
          livenessProbe: {{- toJson . | nindent 10 }}
{{- end }}
{{- with .Values.readinessProbe }}
          readinessProbe: {{- toJson . | nindent 10 }}
{{- end }}
